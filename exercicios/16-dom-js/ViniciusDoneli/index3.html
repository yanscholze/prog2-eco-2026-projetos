<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Revisão DOM</title>
  <style>
    .resposta {
      margin-top: 5px;
      color: green;
    }
  </style>
</head>
<body>

  <h2>Perguntas de Revisão (DOM)</h2>

  <p>1. O que é o DOM?</p>
  <button onclick="mostrarResposta('r1', 'O DOM é uma representação em árvore dos elementos HTML que permite manipulá-los com JavaScript.')">
    Mostrar resposta
  </button>
  <div id="r1" class="resposta"></div>

  <p>2. Para que serve o querySelector?</p>
  <button onclick="mostrarResposta('r2', 'O querySelector serve para selecionar elementos do HTML usando seletores CSS.')">
    Mostrar resposta
  </button>
  <div id="r2" class="resposta"></div>

  <p>3. O que faz o innerHTML?</p>
  <button onclick="mostrarResposta('r3', 'O innerHTML permite adicionar ou modificar o conteúdo HTML dentro de um elemento.')">
    Mostrar resposta
  </button>
  <div id="r3" class="resposta"></div>

  <script>
    function mostrarResposta(id, texto) {
      const div = document.querySelector("#" + id);
      div.innerHTML = "Resposta: " + texto;
    }
  </script>

</body>
</html>
