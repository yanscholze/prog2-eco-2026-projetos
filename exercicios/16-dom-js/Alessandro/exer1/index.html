<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Exercício 1 - Tema Claro/Escuro</title>
    <style>
        body {
            transition: background-color 0.3s, color 0.3s;
        }
        .container {
            margin: 40px auto;
            max-width: 400px;
            text-align: center;
        }
        button {
            margin: 10px;
            padding: 10px 20px;
            font-size: 1rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Alterando o Tema da Página</h1>
        <button id="claro">Tema Claro</button>
        <button id="escuro">Tema Escuro</button>
    </div>
    <script>
        const body = document.querySelector("body");
        document.getElementById("claro").addEventListener("click", function() {
            body.style.backgroundColor = "#fff";
            body.style.color = "#222";
        });
        document.getElementById("escuro").addEventListener("click", function() {
            body.style.backgroundColor = "#222";
            body.style.color = "#fff";
        });
    </script>
</body>
</html>
