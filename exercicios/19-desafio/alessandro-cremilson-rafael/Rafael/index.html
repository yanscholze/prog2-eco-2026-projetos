<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Notas escola</title>
    <style>
        body { font-family: sans-serif; padding: 20px; line-height: 1.5; }
        form { max-width: 400px; background: #f9f9f9; padding: 20px; border-radius: 8px; border: 1px solid #ddd; }
        label { display: block; margin-top: 15px; font-weight: bold; }
        input { width: 100%; padding: 8px; margin-top: 5px; border: 1px solid #ccc; border-radius: 4px; }
        button { margin-top: 20px; padding: 10px 20px; background: #006699; color: white; border: none; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>
    <h2>Estudante</h2>
    <form action="#" method="post">
        <label for="nome">nome (Obrigatório):</label>
        <input type="text" id="nome" required >
        
        <label for="matricula">matricula:</label>
        <input type="number" id="matricula">

        <label for="nascimento">Data de Nascimento:</label>
        <input type="date" id="nascimento">

        <label for="bolsista">bolsista</label>
        <input type="radio" id="bolsista">
        <label for="normal">normal</label>
        <input type="radio" id="normal">

        <label for="nota feiticaria">nota feiticaria</label>
        <input type="number" id="nota feiticaria" value="0-10">

        <label for="nota pocoes">nota pocoes:</label>
        <input type="number" id="nota pocoes" value="0-10">

        <label for="nota transfiguracao">nota transfiguracao</label>
        <input type="number" id="nota transfiguracao" value="0-10">

    </form>
</body>
</html>
