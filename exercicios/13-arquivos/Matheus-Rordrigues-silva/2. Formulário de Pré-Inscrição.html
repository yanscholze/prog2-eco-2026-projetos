<!DOCTYPE html>
<html lang="pt-B">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Formulário de Pré-Inscrição</title>

        <style>
            body { font-family: sans-serif; padding: 20px; line-height: 1.5; }
            form { max-width: 400px; background: #f9f9f9; padding: 20px; border-radius: 8px; border: 1px solid #ddd; }
            label { display: block; margin-top: 15px; font-weight: bold; }
            input { width: 100%; padding: 8px; margin-top: 5px; border: 1px solid #ccc; border-radius: 4px; }
            button { margin-top: 20px; padding: 10px 20px; background: #006699; color: white; border: none; border-radius: 4px; cursor: pointer; }
        </style>
    </head>

    <body>
        <h1>Formulário</h1>
        
        <form action="#">
            <label for="nome">Nome:</label>
            <input type="text" id="nome" placeholder="Matheus Rodrigues Silva" required>

            <label for="email">E-mail:</label>
            <input type="email" id="email" placeholder="email1@gmail.com" required>

            <label for="telefone">Telefone:</label>
            <input type="tel" id="telefone" placeholder="(11) 91234-5678" required>

            <label for="idade">Idade:</label>
            <input type="number" id="idade" placeholder="25" required min="0" max="100">

            <label for="CEP">CEP:</label>
            <input type="text" id="CEP" placeholder="01234567" required min ="00000000" max="99999999">

            <button type="submit">Enviar</button>
        </form>
    </body>
</html>
