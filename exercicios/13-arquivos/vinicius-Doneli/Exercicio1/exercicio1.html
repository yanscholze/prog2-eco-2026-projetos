<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Calculadora de Operações</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        input, select, button {
            padding: 8px;
            margin: 5px;
            font-size: 14px;
        }
        button {
            background-color: #4CAF50;
            color: white;
            cursor: pointer;
            border: none;
        }
        button:hover {
            background-color: #45a049;
        }
        .resultado {
            margin-top: 20px;
            padding: 10px;
            background-color: #f0f0f0;
            display: none;
        }
        .resultado.show {
            display: block;
        }
        .erro {
            margin-top: 20px;
            padding: 10px;
            background-color: #ffcccc;
            color: red;
            display: none;
        }
        .erro.show {
            display: block;
        }
    </style>
</head>
<body>
    <h1>Calculadora</h1>
    
    <div>
        <label>Valor 1: <input type="number" id="valor1" step="any"></label><br>
        <label>Valor 2: <input type="number" id="valor2" step="any"></label><br>
        <label>Operação:
            <select id="operacao">
                <option value="">-- Selecione --</option>
                <option value="soma">Soma</option>
                <option value="subtracao">Subtração</option>
                <option value="multiplicacao">Multiplicação</option>
                <option value="potencia">Potência</option>
                <option value="divisao">Divisão</option>
            </select>
        </label><br>
        <button onclick="calcular()">Calcular</button>
    </div>

    <div id="resultado" class="resultado">
        <strong>Resultado:</strong> <span id="resultado-valor"></span>
    </div>

    <div id="erro" class="erro"></div>

    <script>
        class Operacao {
            calcular(a, b) {
                throw new Error("Método calcular() deve ser implementado");
            }
        }

        class Soma extends Operacao {
            calcular(a, b) { return a + b; }
        }

        class Subtracao extends Operacao {
            calcular(a, b) { return a - b; }
        }

        class Multiplicacao extends Operacao {
            calcular(a, b) { return a * b; }
        }

        class Potencia extends Operacao {
            calcular(a, b) { return Math.pow(a, b); }
        }

        class DivisaoSegura extends Operacao {
            calcular(a, b) {
                if (b === 0) throw new Error("Erro: não é possível dividir por zero!");
                return a / b;
            }
        }
        function executarOperacao(a, b, operacao) {
            return operacao.calcular(a, b);
        }

        function calcular() {
            const valor1 = document.getElementById("valor1").value;
            const valor2 = document.getElementById("valor2").value;
            const operacaoSelecionada = document.getElementById("operacao").value;

            const resultadoDiv = document.getElementById("resultado");
            const erroDiv = document.getElementById("erro");

            resultadoDiv.classList.remove("show");
            erroDiv.classList.remove("show");

            try {
                if (!valor1 || !valor2 || !operacaoSelecionada) {
                    throw new Error("Preencha todos os campos!");
                }

                const a = parseFloat(valor1);
                const b = parseFloat(valor2);

                if (isNaN(a) || isNaN(b)) {
                    throw new Error("Valores devem ser números válidos!");
                }

                let operacao;
                switch (operacaoSelecionada) {
                    case "soma": operacao = new Soma(); break;
                    case "subtracao": operacao = new Subtracao(); break;
                    case "multiplicacao": operacao = new Multiplicacao(); break;
                    case "potencia": operacao = new Potencia(); break;
                    case "divisao": operacao = new DivisaoSegura(); break;
                }

                const resultado = executarOperacao(a, b, operacao);

                document.getElementById("resultado-valor").textContent = resultado;
                resultadoDiv.classList.add("show");

            } catch (erro) {
                erroDiv.textContent = erro.message;
                erroDiv.classList.add("show");
            }
        }
    </script>
</body>
</html>
</body>
</html>
